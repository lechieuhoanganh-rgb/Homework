<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Image Library</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
        }


        .image-library {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            max-width: 1000px;
            width: 100%;
        }

        .image-card {
            position: relative;
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);

            transition: all 0.4s ease; 
            cursor: pointer;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 15px;
            text-align: center;
            opacity: 0;
            transform: translateY(100%);
            transition: all 0.4s ease;
        }
    </style>
</head>
<body>

    <h1>My Interactive Image Library (Testing)</h1>

    <div class="image-library">
        <div class="image-card">
            <img src="/img/d1.jpg" alt="banana">
            <div class="overlay">Banana</div>
        </div>

        <div class="image-card">
            <img src="img/d2.jpg" alt="b-dice">
            <div class="overlay">Black Dice</div>
        </div>

        <div class="image-card">
            <img src="img/d3.jpg" alt="nor-dice">
            <div class="overlay">Wood Dice</div>
        </div>
    </div>

    <script>
  
        const imageCards = document.querySelectorAll('.image-card');

 
        imageCards.forEach(card => {
            const img = card.querySelector('img');
            const overlay = card.querySelector('.overlay');

   
            card.addEventListener('mouseenter', () => {
              
                card.style.transform = 'translateY(-10px)';
                card.style.boxShadow = '0 12px 20px rgba(0,0,0,0.15)';
 
                img.style.transform = 'scale(1.1)';

                overlay.style.opacity = '1';
                overlay.style.transform = 'translateY(0)';
            });


            card.addEventListener('mouseleave', () => {
 
                card.style.transform = 'translateY(0)';
                card.style.boxShadow = '0 4px 8px rgba(0,0,0,0.05)';

                img.style.transform = 'scale(1)';

                overlay.style.opacity = '0';
                overlay.style.transform = 'translateY(100%)';
            });
        });
    </script>
</body>
</html>
